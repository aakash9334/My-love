<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Only For You 💖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#ff5f9e,#ff9acb);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* HEART RAIN */
.heart{
  position:fixed;
  top:-10px;
  animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* Main Box */
.container{
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  padding:50px 35px;
  border-radius:25px;
  text-align:center;
  width:90%;
  max-width:450px;
  box-shadow:0 10px 35px rgba(0,0,0,0.25);
  color:white;
  z-index:2;
}

h1{
  font-size:30px;
  margin-bottom:25px;
}

.lyrics{
  font-size:24px;
  line-height:1.8;
  min-height:120px;
  font-weight:600;
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Only For You 💝</h1>
  <div class="lyrics" id="lyrics">💗 Wait for magic...</div>
</div>

<audio id="song" src="assets_song.MP3"></audio>

<script>

const song = document.getElementById("song");
const lyricsBox = document.getElementById("lyrics");

const timedLyrics = [

  { text:"हमरा से पहले ना हमरा से केहु बाद 💖", time:0 },

  { text:"Love you love you कही 💕", time:3.6 },

  { text:"हमरा से पहले ना हमरा से केहु बाद 💗", time:6.0 },

  { text:"Love you love you कही 💞", time:9.5 },

  { text:"हो love you love you कही ❤️", time:12 },

  { text:"हमके बनाला बॉडीगॉर्ड ब्यूटी बनल रही 😍", time:14 },

  { text:"हमके बनाला बॉडीगॉर्ड ब्यूटी बनल रही ✨", time:18 }

];

let index = 0;

window.onload = () => {
  song.play().catch(()=>{
    lyricsBox.innerText="▶️ Tap anywhere to start...";
  });
};

document.body.addEventListener("click",()=>{
  song.play();
});

song.addEventListener("timeupdate",()=>{
  if(index < timedLyrics.length){
    if(song.currentTime >= timedLyrics[index].time){
      lyricsBox.innerText = timedLyrics[index].text;
      lyricsBox.style.animation="none";
      lyricsBox.offsetHeight;
      lyricsBox.style.animation="fade 0.6s ease";
      index++;
    }
  }
});

/* HEART RAIN */
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerText="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);

</script>

</body>
</html>
